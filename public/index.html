<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login | Bharat Portal</title>
    <link rel="stylesheet" href="portal-style.css">
    <link rel="stylesheet" href="auth-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo auth-logo">
                <i class="fa-solid fa-dharmachakra"></i> BHARAT PORTAL
            </div>
            <h2>Citizen Authentication</h2>
            <p class="auth-subtitle">Verify your identity to access the national hub.</p>

            <form id="request-otp-form">
                <div class="input-group">
                    <label for="aadhaar"><i class="fa-regular fa-id-card"></i> Aadhaar Number</label>
                    <input type="text" id="aadhaar" pattern="\d{12}" maxlength="12" placeholder="Enter 12-digit Aadhaar" required>
                </div>
                <div class="input-group">
                    <label for="phone"><i class="fa-solid fa-mobile-screen"></i> Linked Mobile Number</label>
                    <input type="tel" id="phone" pattern="\d{10}" maxlength="10" placeholder="10-digit Mobile Number" required>
                </div>
                <button type="submit" class="auth-btn">Generate OTP</button>
                <div id="request-msg" class="form-msg"></div>
            </form>

            <form id="verify-otp-form" style="display: none;">
                <div class="input-group">
                    <label for="otp"><i class="fa-solid fa-key"></i> Enter OTP</label>
                    <input type="text" id="otp" pattern="\d{6}" maxlength="6" placeholder="Enter 6-digit OTP" required>
                    <small class="hint-text">For this demo, use OTP: <strong>123456</strong></small>
                </div>
                <button type="submit" class="auth-btn success-btn">Verify & Login</button>
                <div id="verify-msg" class="form-msg"></div>
            </form>
        </div>
    </div>
    <script src="auth-script.js"></script>
</body>
</html>
